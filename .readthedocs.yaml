# ReadTheDocs configuration for ArchePy.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false  # set to true once docs are stable

formats:
  - htmlzip
  - pdf

python:
  install:
    - requirements: docs/doc_requirements.txt
    # Install the package itself so autodoc can import it.
    # We don't install [gpu]/[fmri] extras — autodoc_mock_imports
    # in conf.py handles those.
    - method: pip
      path: .
